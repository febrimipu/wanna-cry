# Development override.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# After the first build, perubahan code TIDAK perlu rebuild:
#   - control-plane (.ts) auto-restart via ts-node-dev
#   - views (.ejs) langsung aktif (cukup refresh browser)
#   - runner (.py) auto-restart via watchmedo (watchdog)
#
# Kalau ganti dependency (package.json / requirements.txt), baru rebuild:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml build

services:
  api:
    build:
      context: ./control-plane
      dockerfile: Dockerfile.dev
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      # Bind-mount source supaya perubahan langsung kebaca.
      - ./control-plane:/app
      # node_modules tetap dari dalam container (jangan ketiban bind mount host).
      - cp_node_modules:/app/node_modules
    restart: unless-stopped

  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile.dev
    command:
      [
        "watchmedo",
        "auto-restart",
        "--directory=/app",
        "--pattern=*.py;*.yml",
        "--recursive",
        "--",
        "python3",
        "app.py",
      ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_DIR:-./projects}:/opt/projects
      # Bind-mount seluruh folder runner (termasuk config.yml & app.py).
      - ./runner:/app
    restart: unless-stopped

volumes:
  cp_node_modules:
